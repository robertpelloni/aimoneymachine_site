<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title id="pageTitle">Bot Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 20px;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 4px;
      }
      .sub {
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 16px;
      }
      .card h3 {
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 4px;
        text-transform: uppercase;
      }
      .card .value {
        font-size: 1.8rem;
        font-weight: 700;
      }
      .card .sub {
        font-size: 0.75rem;
        color: #64748b;
        margin-top: 4px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      th {
        text-align: left;
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        padding: 8px 4px;
        border-bottom: 1px solid #334155;
      }
      td {
        font-size: 0.82rem;
        padding: 6px 4px;
        border-bottom: 1px solid #1e293b;
      }
      .green {
        color: #22c55e;
      }
      .yellow {
        color: #eab308;
      }
      .red {
        color: #ef4444;
      }
      .blue {
        color: #3b82f6;
      }
      .back {
        color: #64748b;
        text-decoration: none;
        font-size: 0.85rem;
        display: inline-block;
        margin-bottom: 15px;
      }
      .back:hover {
        color: #fff;
      }
      .color-bar {
        height: 4px;
        border-radius: 2px;
        margin-bottom: 15px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <a class="back" href="http://localhost:8083/">← Back to Dashboard</a>
    <div class="color-bar" id="colorBar"></div>
    <h1 id="botName">Loading...</h1>
    <div class="sub" id="botSub">Trading Bot Dashboard</div>

    <div class="grid" id="statsGrid"></div>

    <h2>Trade History</h2>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Price</th>
          <th>RSI</th>
          <th>Decision</th>
        </tr>
      </thead>
      <tbody id="tradeLog"></tbody>
    </table>

    <h2 style="margin-top: 20px">Price History</h2>
    <div
      id="priceChart"
      style="
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 16px;
        min-height: 200px;
        font-size: 0.85rem;
        color: #64748b;
        font-family: monospace;
        white-space: pre;
        overflow-x: auto;
      "
    ></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const symbol = params.get("sym") || "BTC";

      const colors = {
        BTC: "#F7931A",
        ETH: "#627EEA",
        SOL: "#9945FF",
        DOGE: "#C2A633",
        XRP: "#23292F",
        ADA: "#0033AD",
        LINK: "#2A5ADA",
      };
      document.getElementById("pageTitle").textContent =
        symbol + " Bot Dashboard";
      document.getElementById("botName").textContent = symbol + " Trading Bot";
      document.getElementById("botSub").textContent =
        "Real-time statistics and trade history";
      document.getElementById("colorBar").style.background =
        colors[symbol] || "#2563EB";

      async function fetchLog() {
        try {
          const r = await fetch("/api/log");
          return await r.text();
        } catch (e) {
          return "";
        }
      }

      function parseBotData(log) {
        const lines = log
          .split("\n")
          .filter((l) => l.includes(`Symbol: ${symbol}`));
        const prices = [];
        const rsis = [];
        const decisions = [];
        const trades = [];

        for (const line of lines) {
          const pm = line.match(/Price for \w+: \$?([0-9,.]+)/);
          if (pm) prices.push(parseFloat(pm[1].replace(/,/g, "")));

          const rm = line.match(/RSI\(14\): ([0-9.]+)/);
          if (rm) rsis.push(parseFloat(rm[1]));

          const dm = line.match(/Decision: (\w+)/);
          if (dm) decisions.push(dm[1]);

          if (line.includes("BUY") || line.includes("SELL")) {
            const tm = line.match(/(\d{2}:\d{2}:\d{2})/);
            trades.push({
              time: tm ? tm[1] : "--",
              price: pm ? pm[1] : "--",
              rsi: rm ? rm[1] : "--",
              decision: dm ? dm[1] : "--",
            });
          }
        }

        return { prices, rsis, decisions, trades, cycles: lines.length };
      }

      function renderStats(data) {
        const grid = document.getElementById("statsGrid");
        const lastPrice =
          data.prices.length > 0 ? data.prices[data.prices.length - 1] : 0;
        const lastRSI =
          data.rsis.length > 0
            ? data.rsis[data.rsis.length - 1].toFixed(1)
            : "--";
        const lastDecision =
          data.decisions.length > 0
            ? data.decisions[data.decisions.length - 1]
            : "--";
        const priceChange =
          data.prices.length > 1
            ? (((lastPrice - data.prices[0]) / data.prices[0]) * 100).toFixed(2)
            : 0;

        grid.innerHTML = `
    <div class="card"><h3>Cycles</h3><div class="value" style="color:${colors[symbol]}">${data.cycles}</div></div>
    <div class="card"><h3>Price</h3><div class="value">$${lastPrice.toLocaleString()}</div><div class="sub ${priceChange >= 0 ? "green" : "red"}">${priceChange >= 0 ? "+" : ""}${priceChange}%</div></div>
    <div class="card"><h3>RSI (14)</h3><div class="value ${lastRSI > 70 ? "red" : lastRSI < 30 ? "green" : "yellow"}">${lastRSI}</div></div>
    <div class="card"><h3>Last Signal</h3><div class="value ${lastDecision === "BUY" ? "green" : lastDecision === "SELL" ? "red" : "yellow"}">${lastDecision}</div></div>
    <div class="card"><h3>Stop Loss</h3><div class="value green">5%</div></div>
    <div class="card"><h3>Trailing</h3><div class="value blue">8%</div></div>
  `;
      }

      function renderTrades(trades) {
        const tbody = document.getElementById("tradeLog");
        if (trades.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="4" style="color:#64748B;text-align:center;padding:20px">No trades yet</td></tr>';
          return;
        }
        tbody.innerHTML = trades
          .slice(-20)
          .reverse()
          .map(
            (t) =>
              `<tr><td>${t.time}</td><td>$${t.price}</td><td>${t.rsi}</td><td class="${t.decision === "BUY" ? "green" : "red"}" style="font-weight:600">${t.decision}</td></tr>`,
          )
          .join("");
      }

      function renderChart(prices, rsis) {
        const chart = document.getElementById("priceChart");
        if (prices.length < 2) {
          chart.textContent =
            "Not enough data for price chart yet. Accumulating history...";
          return;
        }

        const maxP = Math.max(...prices);
        const minP = Math.min(...prices);
        const range = maxP - minP || 1;
        const width = 60;
        const height = 12;

        let lines = ["Price History (last " + prices.length + " cycles):", ""];

        // Simple ASCII chart
        const chartHeight = 10;
        for (let row = chartHeight; row >= 0; row--) {
          const level = minP + (range * row) / chartHeight;
          let line = (level.toLocaleString() + " ").padStart(12) + "|";
          for (const p of prices) {
            if (p >= level - range / chartHeight / 2) {
              line += "█";
            } else {
              line += " ";
            }
          }
          lines.push(line);
        }
        lines.push("             +" + "-".repeat(prices.length));

        lines.push("");
        lines.push("RSI:");
        for (
          let i = 0;
          i < rsis.length;
          i += Math.max(1, Math.floor(rsis.length / 20))
        ) {
          lines.push(`  Cycle ${i + 1}: ${rsis[i].toFixed(1)}`);
        }

        chart.textContent = lines.join("\n");
      }

      async function refresh() {
        const log = await fetchLog();
        const data = parseBotData(log);
        renderStats(data);
        renderTrades(data.trades);
        renderChart(data.prices, data.rsis);
      }

      refresh();
      setInterval(refresh, 10000);
    </script>
  </body>
</html>
