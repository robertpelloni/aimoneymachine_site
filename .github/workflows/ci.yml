name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.3'
    - name: Run Tests
      run: |
        go test ./hustle/content/...
        go test ./hustle/curation/...
        go test ./hustle/research/...
        go test ./hustle/social/...
        go test ./hustle/trading/...
        go test ./orchestrator/...
    - name: Build
      run: ./build.sh
